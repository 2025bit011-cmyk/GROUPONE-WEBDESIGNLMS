    <script>
        function filterBooks() {
            let input = document.getElementById('searchBar').value.toUpperCase();
            let table = document.getElementById('catalogTable');
            let tr = table.getElementsByTagName('tr');

            for (let i = 1; i < tr.length; i++) {
                let title = tr[i].getElementsByTagName('td')[1].innerText.toUpperCase();
                let author = tr[i].getElementsByTagName('td')[2].innerText.toUpperCase();
                if (title.indexOf(input) > -1 || author.indexOf(input) > -1) {
                    tr[i].style.display = "";
                } else {

                }
            }
        }
